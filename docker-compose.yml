# =====================================================
# SANASH — Docker Compose
# =====================================================
# Local development environment
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # View logs
#   docker compose down           # Stop all services
#
# After first start, seed demo data:
#   docker compose exec api python scripts/seed_data.py
# =====================================================

services:
  # ---------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sanash_db
    environment:
      POSTGRES_DB: sanash
      POSTGRES_USER: sanash
      POSTGRES_PASSWORD: sanash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanash"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------
  # Redis (optional: cache / future task queue)
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sanash_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sanash_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sanash:sanash@postgres:5432/sanash
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:80"]'
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ---------------------------------------------------
  # React Dashboard (Vite build → Nginx)
  # ---------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sanash_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------
  # Nginx reverse proxy
  # ---------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: sanash_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
